<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>제천 CCC</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#131a3d">

<!-- iOS 홈 화면 앱처럼 실행 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="제천 CCC">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<!-- 안드로이드 -->
<meta name="mobile-web-app-capable" content="yes">

<!-- 파비콘 -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/woff2-subset/Pretendard-Regular.subset.woff2') format('woff2');
  font-weight: 400; font-display: swap;
}
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/woff2-subset/Pretendard-Medium.subset.woff2') format('woff2');
  font-weight: 500; font-display: swap;
}
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/woff2-subset/Pretendard-SemiBold.subset.woff2') format('woff2');
  font-weight: 600; font-display: swap;
}
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/woff2-subset/Pretendard-Bold.subset.woff2') format('woff2');
  font-weight: 700; font-display: swap;
}
@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/woff2-subset/Pretendard-ExtraBold.subset.woff2') format('woff2');
  font-weight: 800; font-display: swap;
}
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&display=swap');

:root{
  --sky-deep:   #131a3d;
  --sky-mid:    #4a4a8c;
  --sky-warm:   #d98a5f;
  --sky-gold:   #f4c869;
  --paper:      #fbf9f5;
  --ink:        #1c1b2e;
  --ink-soft:   #6a6a83;
  --line:       #e8e5dd;
  --card:       #ffffff;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
:focus-visible{ outline:2.5px solid var(--sky-warm); outline-offset:3px; border-radius:6px; }
@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
}

/* ---------- Hero : dawn sky ---------- */
.hero{
  position:relative;
  min-height:46vh;
  background:linear-gradient(180deg,
    var(--sky-deep) 0%,
    var(--sky-mid) 46%,
    var(--sky-warm) 78%,
    var(--sky-gold) 100%);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:56px 28px 40px;
}
.hero::before{ /* stars */
  content:'';
  position:absolute; inset:0;
  background-image:
    radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,255,255,.85), transparent),
    radial-gradient(1.5px 1.5px at 28% 10%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 45% 22%, rgba(255,255,255,.7), transparent),
    radial-gradient(1.5px 1.5px at 62% 8%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 78% 16%, rgba(255,255,255,.75), transparent),
    radial-gradient(1.5px 1.5px at 90% 12%, rgba(255,255,255,.55), transparent),
    radial-gradient(1px 1px at 20% 35%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 68% 30%, rgba(255,255,255,.4), transparent);
  opacity:.9;
  animation:twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle{ from{opacity:.55;} to{opacity:1;} }
.sun{
  position:absolute;
  left:50%; bottom:-60px;
  width:220px; height:220px;
  transform:translateX(-50%);
  border-radius:50%;
  background:radial-gradient(circle at 50% 35%, #fff7e0 0%, var(--sky-gold) 55%, rgba(244,200,105,0) 78%);
  filter:blur(1px);
  animation:rise 2.4s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes rise{
  from{ opacity:0; transform:translate(-50%, 40px) scale(.85); }
  to{   opacity:1; transform:translate(-50%, 0) scale(1); }
}
.hero-content{ position:relative; z-index:2; }
.eyebrow{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:300;
  font-size:15px;
  letter-spacing:.08em;
  color:rgba(255,255,255,.82);
  margin-bottom:10px;
}
.wordmark{
  font-size:34px;
  font-weight:800;
  letter-spacing:-0.02em;
  color:#fff;
  line-height:1.15;
  text-shadow:0 2px 18px rgba(0,0,0,.18);
}
.tagline{
  margin-top:10px;
  font-size:14.5px;
  font-weight:500;
  color:rgba(255,255,255,.88);
  line-height:1.55;
  max-width:30ch;
}
.cross-mark{
  position:absolute; top:26px; right:26px;
  width:30px; height:30px;
  z-index:2;
  opacity:.92;
}

/* ---------- Body ---------- */
.body-wrap{
  max-width:520px;
  margin:0 auto;
  padding:26px 20px 60px;
}
.section-label{
  font-size:12.5px;
  font-weight:700;
  letter-spacing:.06em;
  color:var(--ink-soft);
  text-transform:uppercase;
  margin:26px 2px 12px;
}
.section-label:first-child{ margin-top:0; }

.tile-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:11px;
}
.tile{
  font-family:inherit;
  appearance:none;
  -webkit-appearance:none;
  outline:none;
  position:relative;
  aspect-ratio:1/1.02;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:9px;
  text-decoration:none;
  color:var(--ink);
  border:1px solid var(--line);
  background:var(--card);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.tile:active{ transform:scale(.96); }
.tile.active{
  border-color:transparent;
  background:linear-gradient(155deg, #fff 0%, #fff7ea 100%);
  box-shadow:0 1px 2px rgba(28,27,46,.04), 0 10px 24px -12px rgba(217,138,95,.35);
}
.tile.active:hover{
  transform:translateY(-3px);
  box-shadow:0 4px 10px rgba(28,27,46,.06), 0 18px 30px -14px rgba(217,138,95,.45);
  border-color:var(--sky-warm);
}
.tile.soon{ opacity:.55; }
.tile.soon:active{ transform:none; }
.tile-icon{
  width:38px; height:38px;
  display:flex; align-items:center; justify-content:center;
  border-radius:12px;
}
.tile.active .tile-icon{
  background:linear-gradient(135deg, var(--sky-warm), var(--sky-gold));
  box-shadow:0 6px 14px -6px rgba(217,138,95,.6);
}
.tile.soon .tile-icon{ background:#eeece6; }
.tile-icon svg{ width:19px; height:19px; }
.tile-name{ font-size:13px; font-weight:600; letter-spacing:-0.01em; }
.tile-sub{
  position:absolute; top:8px; right:8px;
  font-size:9px; font-weight:700;
  color:#a6a4b0;
  background:#f1efe9;
  padding:2px 6px;
  border-radius:20px;
  letter-spacing:.02em;
}

.notice-row{
  display:flex; align-items:center; gap:12px;
  padding:15px 16px;
  border-radius:14px;
  border:1px solid var(--line);
  background:var(--card);
}
.notice-icon{
  flex:none;
  width:34px; height:34px;
  border-radius:10px;
  background:#f1efe9;
  display:flex; align-items:center; justify-content:center;
  color:var(--ink-soft);
}
.notice-text p:first-child{ font-size:13.5px; font-weight:600; }
.notice-text p:last-child{ font-size:12px; color:var(--ink-soft); margin-top:2px; }

.footer{
  text-align:center;
  margin-top:44px;
  padding-top:20px;
  border-top:1px solid var(--line);
}
.footer p{ font-size:11.5px; color:#a6a4b0; letter-spacing:.02em; }
.footer .amen{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:13px;
  color:var(--sky-warm);
  margin-top:6px;
}

/* toast */
.toast{
  position:fixed; left:50%; bottom:28px;
  transform:translate(-50%, 20px);
  background:var(--ink);
  color:#fff;
  font-size:13px; font-weight:500;
  padding:12px 20px;
  border-radius:100px;
  opacity:0; pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
  z-index:50;
  white-space:nowrap;
  box-shadow:0 12px 30px -10px rgba(0,0,0,.35);
}
.toast.show{ opacity:1; transform:translate(-50%, 0); }/* install banner */
.install-banner{
  position:fixed; left:14px; right:14px; bottom:14px;
  max-width:492px; margin:0 auto;
  background:var(--ink);
  color:#fff;
  border-radius:16px;
  padding:14px 14px 14px 16px;
  display:flex; align-items:center; gap:12px;
  box-shadow:0 16px 40px -12px rgba(0,0,0,.45);
  transform:translateY(120%);
  transition:transform .35s cubic-bezier(.2,.8,.2,1);
  z-index:60;
}
.install-banner.show{ transform:translateY(0); }
.install-banner .ib-icon{
  flex:none; width:36px; height:36px; border-radius:10px;
  background:linear-gradient(135deg, var(--sky-warm), var(--sky-gold));
  display:flex; align-items:center; justify-content:center;
}
.install-banner .ib-text{ flex:1; min-width:0; }
.install-banner .ib-text p:first-child{ font-size:13px; font-weight:700; }
.install-banner .ib-text p:last-child{ font-size:11.5px; color:rgba(255,255,255,.65); margin-top:1px; }
.install-banner .ib-action{
  flex:none;
  background:#fff; color:var(--ink);
  font-size:12.5px; font-weight:700;
  padding:9px 14px; border-radius:100px;
  border:none; cursor:pointer;
  white-space:nowrap;
}
.install-banner .ib-close{
  flex:none;
  width:22px; height:22px;
  border:none; background:none;
  color:rgba(255,255,255,.5);
  font-size:16px; cursor:pointer;
  line-height:1;
}
</style>
</head>
<body>

<header class="hero">
  <svg class="cross-mark" viewBox="0 0 24 24" fill="none">
    <path d="M12 2 V22 M4 9 H20" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <div class="sun" aria-hidden="true"></div>
  <div class="hero-content">
    <p class="eyebrow">Jecheon CCC</p>
    <h1 class="wordmark">제천 CCC</h1>
    <p class="tagline">함께 아침을 열고, 함께 세워가는 캠퍼스 공동체</p>
  </div>
</header>

<main class="body-wrap">
  <p class="section-label">바로가기</p>
  <div class="tile-grid">

    <button class="tile active" id="financeTile" aria-label="재정 — 회비 납부 및 확인">
      <span class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2.2" stroke="#fff" stroke-width="1.7"/><path d="M3 10H21" stroke="#fff" stroke-width="1.7"/><circle cx="7" cy="14.5" r="1.1" fill="#fff"/></svg>
      </span>
      <span class="tile-name">재정</span>
    </button>

    <button class="tile soon" data-soon="아침모임 출석">
      <span class="tile-sub">준비중</span>
      <span class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="14" r="7" stroke="#9a97a6" stroke-width="1.7"/><path d="M12 10.5V14L14.3 15.6" stroke="#9a97a6" stroke-width="1.7" stroke-linecap="round"/><path d="M9 3H15 M12 3V6" stroke="#9a97a6" stroke-width="1.7" stroke-linecap="round"/></svg>
      </span>
      <span class="tile-name">아침모임 출석</span>
    </button>

    <button class="tile soon" data-soon="공지사항">
      <span class="tile-sub">준비중</span>
      <span class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 5.5C4 4.7 4.7 4 5.5 4H14L20 9V18.5C20 19.3 19.3 20 18.5 20H5.5C4.7 20 4 19.3 4 18.5V5.5Z" stroke="#9a97a6" stroke-width="1.7"/><path d="M8 12H16 M8 15.5H13" stroke="#9a97a6" stroke-width="1.7" stroke-linecap="round"/></svg>
      </span>
      <span class="tile-name">공지사항</span>
    </button>

  </div>

  <p class="section-label">공지 · 소식</p>
  <div class="notice-row">
    <span class="notice-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2 V22 M4 9 H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </span>
    <div class="notice-text">
      <p>제천 CCC 재정 관리 시스템이 열렸습니다</p>
      <p>회비 납부 및 확인은 [재정] 메뉴에서 진행해주세요</p>
    </div>
  </div>

  <div class="footer">
    <p>제천 CCC · Jecheon Campus Crusade for Christ</p>
    <p class="amen">"먼저 그 나라와 그 의를 구하라" — 마태복음 6:33</p>
  </div>
</main>

<div class="toast" id="toast"></div>

<div class="install-banner" id="installBanner">
  <span class="ib-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2 V22 M4 9 H20" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
  </span>
  <div class="ib-text">
    <p id="ibTitle">제천 CCC를 앱처럼 쓰세요</p>
    <p id="ibSub">홈 화면에 추가하면 앱처럼 실행돼요</p>
  </div>
  <button class="ib-action" id="ibAction">추가</button>
  <button class="ib-close" id="ibClose" aria-label="닫기">✕</button>
</div>

<script>
  const toastEl = document.getElementById('toast');
  let toastTimer;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
  }
  document.getElementById('financeTile').addEventListener('click', () => {
    window.location.href = 'https://ccc-finance.vercel.app';
  });

  document.querySelectorAll('[data-soon]').forEach(btn => {
    btn.addEventListener('click', () => {
      showToast(`${btn.getAttribute('data-soon')} 기능은 준비 중이에요 🙏`);
    });
  });

  // ---- 서비스 워커 등록 (PWA 설치 가능하게 함) ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

  // ---- 홈 화면 추가 배너 ----
  (function(){
    const banner = document.getElementById('installBanner');
    const titleEl = document.getElementById('ibTitle');
    const subEl = document.getElementById('ibSub');
    const actionBtn = document.getElementById('ibAction');
    const closeBtn = document.getElementById('ibClose');

    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    const dismissed = localStorage.getItem('ccc-install-dismissed');
    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/i.test(ua) && !window.MSStream;
    const isInApp = /KAKAOTALK|Instagram|FBAN|FBAV|Line/i.test(ua);

    if (isStandalone || dismissed || isInApp) return;

    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      reveal();
    });

    function reveal(){
      setTimeout(() => banner.classList.add('show'), 900);
    }

    if (isIOS) {
      titleEl.textContent = '제천 CCC를 앱처럼 쓰세요';
      subEl.textContent = '공유 버튼 → "홈 화면에 추가"를 눌러주세요';
      actionBtn.textContent = '방법 보기';
      actionBtn.addEventListener('click', () => {
        showToast('하단 공유 아이콘 → "홈 화면에 추가"를 눌러주세요 📲');
      });
      reveal();
    } else {
      titleEl.textContent = '제천 CCC를 앱처럼 쓰세요';
      subEl.textContent = '홈 화면에 추가하면 앱처럼 실행돼요';
      actionBtn.textContent = '추가';
      actionBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
          banner.classList.remove('show');
        } else {
          showToast('브라우저 메뉴(⋮) → "홈 화면에 추가"를 눌러주세요 📲');
        }
      });
      // beforeinstallprompt가 안 뜨는 브라우저(삼성인터넷 등)도 있으므로
      // 이벤트 유무와 상관없이 일정 시간 후 배너는 항상 노출한다.
      reveal();
    }

    closeBtn.addEventListener('click', () => {
      banner.classList.remove('show');
      localStorage.setItem('ccc-install-dismissed', '1');
    });
  })();
</script>
</body>
</html>
